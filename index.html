<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Quản lý Hồ sơ</title>

    <link
    rel="stylesheet"
    href="./css/style.css?v=20260723-03"
>

<link
    rel="stylesheet"
    href="./css/theme.css?v=20260723-03"
>

</head>

<body class="theme-ocean">
<!-- =================================
     NỀN ĐỘNG AMBIENT
     ================================= -->

<div
    class="ambient-background"
    aria-hidden="true"
>

    <span
        class="ambient-blob ambient-blob-one"
    ></span>

    <span
        class="ambient-blob ambient-blob-two"
    ></span>

    <span
        class="ambient-blob ambient-blob-three"
    ></span>


    <span
        class="ambient-leaf ambient-leaf-one"
    >
        🌿
    </span>

    <span
        class="ambient-leaf ambient-leaf-two"
    >
        🍃
    </span>

</div>

<div class="container">

    <!-- ========================= -->
    <!-- SIDEBAR -->
    <!-- ========================= -->

    <aside class="sidebar">

        <!-- LOGO -->

        <div class="sidebar-brand">

            <div class="sidebar-brand-icon">
                📂
            </div>

            <div class="sidebar-brand-text">

                <h2>
                    Quản lý Hồ sơ
                </h2>

                <small>
                    Hệ thống nội bộ
                </small>

            </div>

        </div>


        <!-- MENU CUỘN RIÊNG -->

        <nav class="sidebar-navigation">

            <ul class="menu">

                <!-- DỰ ÁN -->

                <li
                    onclick="
                        selectMenu(this);
                        loadPage('project');
                    "
                >
                    <span class="menu-icon">
                        🏗
                    </span>

                    <span>
                        Dự án
                    </span>
                </li>


                <!-- NHÀ CUNG CẤP -->

                <li
                    onclick="
                        selectMenu(this);
                        loadPage('supplier');
                    "
                >
                    <span class="menu-icon">
                        🏢
                    </span>

                    <span>
                        Nhà cung cấp
                    </span>
                </li>


                <!-- QUẢN LÝ THƯ -->

                <li
                    onclick="
                        selectMenu(this);
                        loadPage('letter');
                    "
                >
                    <span class="menu-icon">
                        📨
                    </span>

                    <span>
                        Quản lý thư
                    </span>
                </li>


                <!-- ========================= -->
                <!-- MENU HỒ SƠ -->
                <!-- ========================= -->

                <li class="menu-group">

                    <div
                        class="menu-header"
                        onclick="
                            toggleMenu(
                                'hosoMenu',
                                this
                            );
                        "
                    >

                        <span class="menu-header-left">

                            <span class="menu-icon">
                                📂
                            </span>

                            <span>
                                Hồ sơ
                            </span>

                        </span>

                        <span class="arrow">
                            ▶
                        </span>

                    </div>


                    <ul
                        id="hosoMenu"
                        class="submenu"
                    >

                        <li
                            onclick="
                                selectMenu(this);
                                loadPage('dossier');
                            "
                        >
                            Danh sách hồ sơ
                        </li>


                        <li
                            onclick="
                                selectMenu(this);
                                loadPage('dossier_missing');
                            "
                        >
                            Hồ sơ cần bổ sung
                        </li>


                        <li
                            onclick="
                                selectMenu(this);
                                loadPage('dossier_delivery');
                            "
                        >
                            Đã bàn giao
                        </li>


                        <li
                            onclick="
                                selectMenu(this);
                                loadPage('dossier_paid');
                            "
                        >
                            Đã thanh toán
                        </li>


                        <li
                            onclick="
                                selectMenu(this);
                                loadPage('dossier_archive');
                            "
                        >
                            Lưu hồ sơ
                        </li>

                    </ul>

                </li>


                <!-- SAO LƯU DỮ LIỆU -->

                <li
                    onclick="
                        selectMenu(this);
                        loadPage('backup');
                    "
                >
                    <span class="menu-icon">
                        💾
                    </span>

                    <span>
                        Sao lưu dữ liệu
                    </span>
                </li>

            </ul>

        </nav>

        <!-- =================================
     CHỌN CHỦ ĐỀ GIAO DIỆN
     ================================= -->

<div class="app-theme-box">

    <label for="appThemeSelect">
        Giao diện
    </label>

    <select
        id="appThemeSelect"
        onchange="changeAppTheme(this.value)"
    >
        <option value="theme-sage">
            Sage Garden 🌿
        </option>

        <option value="theme-ocean">
            Ocean Blue
        </option>

        <option value="theme-emerald">
            Emerald Green
        </option>

        <option value="theme-violet">
            Violet
        </option>

        <option value="theme-dark">
            Dark Mode
        </option>

    </select>

</div>


        <!-- ========================= -->
        <!-- THÔNG TIN NGƯỜI DÙNG -->
        <!-- ========================= -->

        <div class="system-user-panel">

            <div class="system-user-info">

                <div class="system-user-icon">
                    👤
                </div>

                <div class="system-user-text">

                    <small>
                        Đang đăng nhập
                    </small>

                    <strong id="currentSystemUsername">
                        Người dùng
                    </strong>

                </div>

            </div>


            <button
                type="button"
                class="system-logout-button"
                onclick="logoutSystem()"
            >
                <span>
                    🚪
                </span>

                <span>
                    Đăng xuất
                </span>
            </button>

        </div>

    </aside>


    <!-- ========================= -->
    <!-- NỘI DUNG CHÍNH -->
    <!-- ========================= -->

    <main
        id="content"
        class="main-content"
    >

        <div class="system-loading">

            <div class="system-loading-spinner"></div>

            <span>
                Đang tải dữ liệu...
            </span>

        </div>

    </main>

</div>


<!-- ========================= -->
<!-- 1. PARSE SDK -->
<!-- ========================= -->

<script src="https://unpkg.com/parse/dist/parse.min.js"></script>


<!-- ========================= -->
<!-- 2. BACK4APP CONFIG -->
<!-- ========================= -->

<script src="./js/back4app-config.js"></script>


<!-- ========================= -->
<!-- 3. ĐĂNG NHẬP -->
<!-- ========================= -->

<script src="./js/auth.js"></script>


<!-- ========================= -->
<!-- 4. CÁC MODULE -->
<!-- ========================= -->

<script src="./js/supplier.js"></script>

<script src="./js/project.js"></script>

<script src="./js/dossier.js?v=delete-fix-02"></script>

<script src="./js/dossier_archive.js"></script>

<script src="./js/letter.js"></script>

<script src="./js/backup.js"></script>


<!-- ========================= -->
<!-- 5. APP -->
<!-- ========================= -->

<script src="./js/app.js"></script>


<!-- ========================= -->
<!-- 6. KIỂM TRA ĐĂNG NHẬP -->
<!-- ========================= -->

<script>

    requireSystemLogin();

</script>

</body>

</html>
