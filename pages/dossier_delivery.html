<div class="delivery-page">

    <h1>🚚 Hồ sơ đã bàn giao</h1>


    <!-- BỘ LỌC -->

    <div class="delivery-toolbar">

        <input
            type="text"
            id="deliverySearch"
            placeholder="Tìm mã HS, dự án, nội dung, NCC..."
            oninput="filterDeliveryDossier()"
        >


        <select
            id="deliveryProjectFilter"
            onchange="filterDeliveryDossier()"
        >

            <option value="">
                Tất cả dự án
            </option>

        </select>


        <select
            id="deliverySupplierFilter"
            onchange="filterDeliveryDossier()"
        >

            <option value="">
                Tất cả nhà cung cấp
            </option>

        </select>


        <select
            id="deliveryPaymentFilter"
            onchange="filterDeliveryDossier()"
        >

            <option value="">
                Tất cả thanh toán
            </option>

            <option value="Chưa thanh toán">
                Chưa thanh toán
            </option>

            <option value="Đã xuất ĐNTT">
                Đã xuất ĐNTT
            </option>

            <option value="Đang xử lý">
                Đang xử lý
            </option>

            <option value="Đã thanh toán">
                Đã thanh toán
            </option>

        </select>


        <!-- LỌC KHOẢNG NGÀY -->

        <div class="delivery-date-range">

            <div>

                <label for="deliveryDateFrom">
                    Từ ngày
                </label>

                <input
                    type="date"
                    id="deliveryDateFrom"
                    onchange="filterDeliveryDossier()"
                >

            </div>


            <span>đến</span>


            <div>

                <label for="deliveryDateTo">
                    Đến ngày
                </label>

                <input
                    type="date"
                    id="deliveryDateTo"
                    onchange="filterDeliveryDossier()"
                >

            </div>

        </div>


        <button
            type="button"
            class="delivery-reset-button"
            onclick="resetDeliveryDossierFilters()"
        >
            Xóa lọc
        </button>

    </div>


    <!-- SỐ LƯỢNG HỒ SƠ -->

    <div class="delivery-result-row">

        <span id="deliveryResultCount">
            0 hồ sơ
        </span>

    </div>


    <!-- BẢNG -->

    <div class="delivery-table-scroll">

        <table class="data-table delivery-table">

            <thead>

                <tr>

                    <th>Mã HS</th>

                    <th>Dự án</th>

                    <th>Nội dung</th>

                    <th>Nhà cung cấp</th>

                    <th>Giá trị</th>

                    <th>Bổ sung hồ sơ</th>

                    <th>Ngày bàn giao</th>

                    <th>Thanh toán</th>

                </tr>

            </thead>


            <tbody id="deliveryTable">

            </tbody>

        </table>

    </div>

</div>
